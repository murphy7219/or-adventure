<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>One HR — Operating Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#EFF3F8;color:#1a1a1a;}
#app{min-height:100vh;display:flex;flex-direction:column;}
:root{
  --blue:#00A9E0;--blue-dark:#0087b3;--blue-deep:#005f80;
  --gray:#757880;--gray-dark:#53565A;--gray-light:#9a9da1;
  --yellow:#FED141;--yellow-dark:#c9a320;
}

/* ── TRANSITIONS ── */
.screen{animation:fadeUp 0.35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.con-reveal{animation:conReveal 0.4s ease both;}
@keyframes conReveal{from{opacity:0;transform:scale(0.97);}to{opacity:1;transform:scale(1);}}

/* ── HEADER ── */
.hdr{background:var(--gray);color:#fff;padding:14px 18px 12px;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hdr-top{display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:.01em;}
.hdr-team{font-size:13px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;}
.hdr-progress{display:flex;gap:6px;margin-top:10px;align-items:center;}
.pdot{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.2);transition:background .4s;}
.pdot.done{background:rgba(255,255,255,.4);}
.pdot.active{background:var(--yellow);}
.hdr-stage{font-size:12px;color:rgba(255,255,255,.55);margin-left:6px;white-space:nowrap;}

/* ── VITALS STRIP ── */
.vitals-strip{
  background:#0a1a24;
  border-bottom:3px solid var(--blue);
  display:flex;
  position:sticky;top:68px;z-index:98;
}
.vital{flex:1;padding:7px 8px;border-right:1px solid rgba(255,255,255,.07);text-align:center;}
.vital:last-child{border-right:none;}
.vital-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:2px;}
.vital-val{font-size:15px;font-weight:700;font-family:'Courier New',Courier,monospace;transition:color 0.8s ease;}
.vital-unit{font-size:8px;color:rgba(255,255,255,.25);margin-top:1px;}
.v-ok   {color:#6ee09a;}
.v-warn {color:#FED141;}
.v-crit {color:#ff6b6b;}
.v-dim  {color:rgba(255,255,255,.25);}
@keyframes valpulse{0%,100%{opacity:1}50%{opacity:.45}}
.v-crit{animation:valpulse 1.1s ease-in-out infinite;}
@keyframes valchange{0%{opacity:.3}100%{opacity:1}}
.val-update{animation:valchange 0.7s ease both;}

/* ── LAYOUT ── */
.content{flex:1;padding:16px;max-width:780px;width:100%;margin:0 auto;padding-bottom:32px;}

/* ── CARDS ── */
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
.lbl{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--gray-light);margin-bottom:10px;}
.body-text{font-size:16px;line-height:1.72;color:#222;}
.body-text+.body-text{margin-top:12px;}

/* ── STAGE BANNER ── */
.stage-banner{border-radius:12px;padding:16px 20px;margin-bottom:14px;}
.stage-banner .sb-meta{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:4px;font-weight:600;letter-spacing:.04em;}
.stage-banner h2{font-size:21px;font-weight:800;color:#fff;margin:0;}

/* ── CONSULT ── */
.consult{background:#fff8e1;border:1.5px solid var(--yellow);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.consult .lbl{color:var(--yellow-dark);margin-bottom:10px;}
.citem{display:flex;align-items:flex-start;gap:10px;font-size:15px;line-height:1.55;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed rgba(201,163,32,.35);}
.citem:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.cnum{background:var(--yellow);color:var(--gray-dark);font-size:11px;font-weight:800;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ctext{color:#3a3520;}

/* ── CHOICES ── */
.choices-section .lbl{color:var(--gray-dark);}
.choice-btn{width:100%;text-align:left;background:#fff;border:2px solid #DDE4EF;border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;font-family:inherit;transition:border-color .15s,transform .12s,box-shadow .15s;}
.choice-btn:hover{border-color:var(--blue);box-shadow:0 3px 12px rgba(0,169,224,.15);transform:translateX(3px);}
.choice-btn:active{transform:translateX(5px) scale(.99);}
.choice-letter{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase;}
.choice-text{font-size:15px;line-height:1.55;color:#333;}

/* ── CONSEQUENCE ── */
.con-wrap{border-radius:14px;overflow:hidden;margin-bottom:14px;}
.con-hdr{padding:14px 20px;}
.con-hdr .con-chose{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.75;color:#fff;margin-bottom:3px;}
.con-hdr .con-verdict{font-size:20px;font-weight:800;color:#fff;}
.con-body{padding:20px;}
.con-text{font-size:16px;line-height:1.7;color:#2a2a2a;margin-bottom:16px;}
.carries{border-radius:8px;padding:12px 16px;}
.carries .lbl{margin-bottom:5px;}
.carries-text{font-size:15px;line-height:1.55;font-style:italic;color:#333;}
.q-good   .con-hdr{background:#276221;}
.q-good   .con-body{background:#F0FBF4;border:2px solid #B7E1CD;border-top:none;}
.q-good   .carries{background:#DFF7E9;}.q-good .carries .lbl{color:#276221;}
.q-middle .con-hdr{background:var(--yellow-dark);}
.q-middle .con-body{background:#FFFBEE;border:2px solid var(--yellow);border-top:none;}
.q-middle .carries{background:#FFF5CC;}.q-middle .carries .lbl{color:var(--yellow-dark);}
.q-poor   .con-hdr{background:#9C0006;}
.q-poor   .con-body{background:#FFF5F5;border:2px solid #F4CCCC;border-top:none;}
.q-poor   .carries{background:#FFEBEB;}.q-poor .carries .lbl{color:#9C0006;}

/* vitals note on consequence */
.vitals-note{
  display:flex;align-items:center;gap:10px;
  background:#0a1a24;border-radius:8px;
  padding:10px 14px;margin-bottom:14px;
  font-size:13px;color:rgba(255,255,255,.65);
  border-left:3px solid var(--blue);
}
.vitals-note-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok  {background:#6ee09a;}
.dot-warn{background:#FED141;}
.dot-crit{background:#ff6b6b;}

/* ── CONTINUE ── */
.continue-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:18px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .18s,transform .1s;letter-spacing:.01em;}
.continue-btn:hover{background:var(--blue-dark);}
.continue-btn:active{background:var(--blue-deep);transform:scale(.99);}

/* ── INTRO ── */
.ambulance-bay{width:100%;height:230px;overflow:hidden;position:relative;}
.ambulance-bay svg{width:100%;height:100%;}
.intro-card-wrap{padding:0 16px 24px;}
.intro-card{margin-top:-44px;position:relative;z-index:2;background:var(--gray-dark);border-radius:16px;padding:26px 22px 28px;color:#fff;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.22);}
.intro-divider{width:40px;height:3px;background:var(--yellow);border-radius:2px;margin:8px auto 18px;}
.intro-title{font-size:28px;font-weight:800;color:#fff;}
.intro-sub{font-size:16px;color:rgba(255,255,255,.72);line-height:1.6;margin-bottom:22px;}
.intro-rules{text-align:left;background:rgba(255,255,255,.09);border-radius:10px;padding:16px 18px;margin-bottom:22px;}
.intro-rules li{font-size:15px;line-height:1.65;margin-bottom:6px;color:rgba(255,255,255,.85);padding-left:4px;}
.intro-rules li:last-child{margin-bottom:0;}
.team-field{width:100%;padding:14px;border-radius:10px;border:none;font-size:16px;font-family:inherit;text-align:center;margin-bottom:14px;color:var(--gray-dark);font-weight:600;background:#fff;}
.team-field::placeholder{color:#aaa;font-weight:400;}
.start-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:18px;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.01em;}
.start-btn:hover{background:var(--blue);}
.start-btn:active{background:var(--blue);}

/* ── END ── */
.end-hero{background:var(--gray-dark);border-radius:14px;padding:28px 22px;color:#fff;text-align:center;margin-bottom:14px;}
.end-icon{font-size:56px;margin-bottom:12px;display:block;}
.end-title{font-size:26px;font-weight:800;margin-bottom:8px;}
.end-sub{font-size:15px;opacity:.72;line-height:1.5;}
.report-card{border-radius:12px;overflow:hidden;margin-bottom:14px;}
.report-hdr{padding:14px 20px;}
.report-hdr h3{color:#fff;font-size:17px;font-weight:700;margin:0;}
.report-body{padding:18px 20px;font-size:16px;line-height:1.7;color:#222;}
.restart-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .18s;}
.restart-btn:hover{background:var(--blue-dark);}
.rg{background:#276221;}.rm{background:var(--yellow-dark);}.rp{background:#9C0006;}
</style>
</head>

function getScenarioKey(stage, variant) {
  if (stage === 1) return '1';
  return `${stage}_${variant}`;
}

function getConsequenceKey(stage, variant, quality) {
  if (stage === 1) return `1_${quality === 'good' ? 'C' : quality === 'middle' ? 'A' : 'B'}`;
  return `${stage}_${variant}_${quality}`;
}

function applyVitals(vObj) {
  if (!vObj) return;
  currentVitals = vObj;
  const fields = ['hr','bp','spo2','rr','temp'];
  fields.forEach(f => {
    const el = document.getElementById('v-'+f);
    if (!el) return;
    el.textContent = vObj[f][0];
    el.className = 'vital-val val-update ' + vObj[f][1];
    setTimeout(()=> el.classList.remove('val-update'), 800);
  });
}

  good:{label:'OR Report — Tier 1: Aligned and Effective',cls:'rg',text:'Your team operated with precision and alignment. You sought the right input at the right moments, made decisions that protected the patient and the procedure, and closed with a clean handoff and meaningful reflection. Mr. Rivera\'s recovery is on track. The next case has a team ready to perform at the same level.'},
  middle:{label:'OR Report — Tier 2: Capable, With Avoidable Friction',cls:'rm',text:'Your team completed the procedure, but created several moments of avoidable friction along the way. Some decisions were made without full alignment; some risks were managed reactively rather than proactively. Mr. Rivera is fine — but the case consumed more time and energy than it needed to. The debrief, if you held one, revealed patterns worth addressing before your next case.'},
  poor:{label:'OR Report — Tier 3: Procedure Complete, Quality Concerns',cls:'rp',text:'The procedure is complete and the patient is recovering. But this case generated a quality flag, a documentation gap, and cascading schedule impact. Several decisions were made under pressure without the right voices in the room. What the team experienced today was survivable — but it did not have to be this hard. Without a structured reflection, the same patterns will likely appear in your next case.'},
};

let S={view:'intro',stage:1,variant:null,choice:null,teamName:''};

/* ── HELPERS ── */
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') el.className=v;
    else if(k==='onclick') el.onclick=v;
    else if(k==='placeholder') el.placeholder=v;
    else if(k==='value') el.value=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null) return;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return el;
}
function div(cls,...ch){return h('div',{class:cls},...ch);}
function p(cls,txt){const el=h('p',{class:cls});el.innerHTML=txt;return el;}
function btn(cls,txt,fn){return h('button',{class:cls,onclick:fn},txt);}

/* ── VITALS STRIP HTML ── */
function renderVitalsStrip(){
  const v=currentVitals;
  return h('div',{class:'vitals-strip'},
    h('div',{class:'vital'},h('div',{class:'vital-label'},'HR bpm'),h('div',{class:'vital-val '+v.hr[1],id:'v-hr'},v.hr[0]),h('div',{class:'vital-unit'},'heart rate')),
    h('div',{class:'vital'},h('div',{class:'vital-label'},'BP mmHg'),h('div',{class:'vital-val '+v.bp[1],id:'v-bp'},v.bp[0]),h('div',{class:'vital-unit'},'blood pressure')),
    h('div',{class:'vital'},h('div',{class:'vital-label'},'SpO2 %'),h('div',{class:'vital-val '+v.spo2[1],id:'v-spo2'},v.spo2[0]),h('div',{class:'vital-unit'},'oxygen sat')),
    h('div',{class:'vital'},h('div',{class:'vital-label'},'RR /min'),h('div',{class:'vital-val '+v.rr[1],id:'v-rr'},v.rr[0]),h('div',{class:'vital-unit'},'resp rate')),
    h('div',{class:'vital'},h('div',{class:'vital-label'},'Temp °F'),h('div',{class:'vital-val '+v.temp[1],id:'v-temp'},v.temp[0]),h('div',{class:'vital-unit'},'temperature'))
  );
}

function vitalsNoteEl(vObj){
  if(!vObj||!vObj.note) return null;
  // pick dot colour from worst vital
  const states=[vObj.hr[1],vObj.bp[1],vObj.spo2[1],vObj.rr[1],vObj.temp[1]];
  const dotCls = states.includes('v-crit')?'dot-crit':states.includes('v-warn')?'dot-warn':'dot-ok';
  const noteEl=div('vitals-note');
  const dot=div('vitals-note-dot');dot.classList.add(dotCls);
  noteEl.appendChild(dot);
  const txt=document.createElement('span');txt.textContent=vObj.note;
  noteEl.appendChild(txt);
  return noteEl;
}

/* ── RENDER ── */
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(S.view==='intro') app.append(renderIntro());
  else if(S.view==='scenario') app.append(renderHeader(),renderVitalsStrip(),renderScenario());
  else if(S.view==='consequence') app.append(renderHeader(),renderVitalsStrip(),renderConsequence());
  else if(S.view==='end') app.append(renderHeader(),renderVitalsStrip(),renderEnd());
}

function renderHeader(){
  const dots=[1,2,3,4,5].map(i=>{
    const cls='pdot'+(i<S.stage?' done':i===S.stage?' active':'');
    return h('div',{class:cls});
  });
  return div('hdr',
    div('hdr-top',
      div('hdr-title','One HR — Operating Room'),
      S.teamName?div('hdr-team',S.teamName):null
    ),
    h('div',{class:'hdr-progress'},...dots,
      h('span',{class:'hdr-stage'},S.view==='end'?'Complete':`Stage ${S.stage} of 5`)
    )
  );
}

function renderIntro(){
  const nameInput=h('input',{class:'team-field',placeholder:'Enter your table name or number (optional)'});
  const startFn=()=>{S.teamName=nameInput.value.trim();S.view='scenario';render();};
  nameInput.addEventListener('keydown',e=>{if(e.key==='Enter') startFn();});
  const wrap=div('screen');
  const bay=div('ambulance-bay');bay.innerHTML=AMBULANCE_SVG;
  wrap.appendChild(bay);
  const cardWrap=div('intro-card-wrap');
  const card=div('intro-card');
  card.appendChild(h('h1',{class:'intro-title'},'Operating Room'));
  const dv=document.createElement('div');dv.className='intro-divider';card.appendChild(dv);
  card.appendChild(p('intro-sub','You are part of a surgical team performing a routine wrist fracture repair on Mr. Rivera, 52. Every role matters. Every decision has impact.'));
  card.appendChild(h('ul',{class:'intro-rules'},
    h('li',null,'Read each scenario as a team before deciding'),
    h('li',null,'Consult the right people before choosing — they hold key information'),
    h('li',null,'One decision per stage — discuss before you tap'),
    h('li',null,'Your goal is not to get every answer right — it\'s to operate as one team')
  ));
  card.appendChild(nameInput);
  card.appendChild(btn('start-btn','Step into the OR →',startFn));
  cardWrap.appendChild(card);
  wrap.appendChild(cardWrap);
  return wrap;
}

function renderScenario(){
  const stage=STAGES[S.stage];
  const paras=S.variant?stage.scenarios[S.variant]:stage.scenario;
  const color=HDR[stage.colorHdr]||'#1C4587';
  // load scenario vitals
  const vKey=getScenarioKey(S.stage,S.variant);
  const vObj=VITALS.scenario[vKey];
  if(vObj) applyVitals(vObj);

  const banner=div('stage-banner');
  banner.style.background=color;
  banner.appendChild(div('sb-meta',stage.section||`Section — Stage ${stage.id}`));
  banner.appendChild(h('h2',null,`${stage.emoji}  ${stage.title}`));

  const choiceBtns=stage.choices.map(ch=>
    h('button',{class:'choice-btn',onclick:()=>makeChoice(ch)},
      div('choice-letter',`Option ${ch.letter}`),
      div('choice-text',ch.text)
    )
  );

  const noteEl=vitalsNoteEl(vObj);

  return div('screen content',
    banner,
    noteEl||null,
    div('card',div('lbl','Scenario — Read to your table'),...paras.map(t=>p('body-text',t))),
    div('consult',
      div('lbl','⚠️ Pause & Consult — Required before deciding'),
      ...stage.consult.map((q,i)=>
        div('citem',(()=>{const n=div('cnum',String(i+1));return n;})(),div('ctext',q))
      )
    ),
    div('card choices-section',div('lbl','Your decision — choose one'),...choiceBtns)
  );
}

function renderConsequence(){
  const ch=S.choice;
  // load consequence vitals
  const vKey=getConsequenceKey(S.stage,S.variant,ch.quality);
  const vObj=VITALS.consequence[vKey];
  if(vObj) setTimeout(()=>applyVitals(vObj),400);

  const nextStage=S.stage<5?STAGES[S.stage+1]:null;
  const isLast=S.stage===5;
  const label=isLast?'View OR Report →':`Continue to ${nextStage.emoji} Stage ${S.stage+1} →`;

  const noteEl=vObj?vitalsNoteEl(vObj):null;

  return div('screen content',
    div(`con-wrap q-${ch.quality} con-reveal`,
      div('con-hdr',div('con-chose',`You chose Option ${ch.letter}`),div('con-verdict',QUALITY_LABEL[ch.quality])),
      div('con-body',
        p('con-text',ch.consequence),
        ch.carryover?div('carries',div('lbl','Carries Forward'),p('carries-text',ch.carryover)):null
      )
    ),
    noteEl||null,
    btn('continue-btn',label,continueToNext)
  );
}

function renderEnd(){
  const ch=S.choice;
  const report=OR_REPORTS[ch.quality];
  return div('screen content',
    div('end-hero',
      h('span',{class:'end-icon'},'✓'),
      h('h2',{class:'end-title'},'Case Complete'),
      p('end-sub','Mr. Rivera\'s wrist fracture repair is done. Here is the outcome of your final decision — and your OR Report.')
    ),
    div(`con-wrap q-${ch.quality} con-reveal`,
      div('con-hdr',div('con-chose',`Stage 5 — Option ${ch.letter}`),div('con-verdict',QUALITY_LABEL[ch.quality])),
      div('con-body',p('con-text',ch.consequence))
    ),
    div('report-card',
      div(`report-hdr ${report.cls}`,h('h3',null,report.label)),
      div('report-body',report.text)
    ),
    btn('restart-btn','↺ Start a new case',restart)
  );
}

/* ── ACTIONS ── */
function makeChoice(ch){
  S.choice=ch;
  S.view='consequence';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function continueToNext(){
  if(S.stage===5){S.view='end';}
  else{S.variant=S.choice.letter;S.stage+=1;S.view='scenario';}
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
  S={view:'intro',stage:1,variant:null,choice:null,teamName:''};
  currentVitals=VITALS.scenario['1'];
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
